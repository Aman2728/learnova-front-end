<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - Learnova</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../style.css">
</head>

<body>
  <div class="auth-container">

    <!-- Left Panel -->
    <div class="features-panel">
      <div class="features-content">

        <div class="logo">
          <div class="logo-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
          </div>
          <span class="logo-text">Learnova</span>
        </div>

        <h1 class="features-title">Start Your Learning Journey</h1>
        <p class="features-subtitle">Join thousands of learners and instructors on our platform</p>

      </div>
    </div>





    <!-- Right Panel -->
    <div class="form-panel">
      <div class="form-container">

        <div class="form-header">
          <h2>Create Account</h2>
          <p>Fill in your details to get started</p>
        </div>

        <form id="registerForm" class="auth-form">

          <!-- Full Name -->
          <div class="form-group">
            <label>Full Name</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              <input type="text" id="regUsername" placeholder="Enter your full name" required>
            </div>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
              <input type="email" id="regEmail" placeholder="Enter your email" required>
            </div>
          </div>
          <!---mobile-->
          <div class="form-group">
            <label>Mobile Number</label>
            <div class="input-wrapper">
            <input type="text" id="regMobile" placeholder="Enter mobile number" required>
          </div>
          </div>


          <!-- Password -->
          <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              <input 
                type="password" 
                id="regPassword"
                placeholder="Create a strong password" 
                minlength="8"
                pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                required
              >
            </div>
          </div>

          <!-- Role -->
          <!-- Role -->
          <div class="form-group">
            <label>Select Role</label>
            <div class="input-wrapper">
             <select id="regRole" required>
              <option value="">Select Role</option>
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
              <option value="admin">Admin</option>
              <option value="parents">Parents</option>
             </select>
            </div>
           </div>

          <button type="submit" class="btn-primary">
            Create Account
          </button>

          <p class="form-footer">
            Already have an account? <a href="login.html">Sign In</a>
          </p>

        </form>

      </div>
    </div>
  </div>
  <script>
  document
  .getElementById("registerForm")
  .addEventListener("submit", registerSubmit);

  function registerSubmit(e) {
  e.preventDefault();

  const username = document.getElementById("regUsername").value;
  const email = document.getElementById("regEmail").value;
  const password = document.getElementById("regPassword").value;
  const mobile = document.getElementById("regMobile").value;
  const role = document.getElementById("regRole").value;

  fetch("http://127.0.0.1:8000/users/create-user/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username,
      email,
      password,
      mobile,
      role
    })
  })
  .then(res => res.json())
  .then(data => {
    console.log(data);

    if (data.success) {
      alert("Registration successful 🎉");
      window.location.href = "login.html";
    } else {
      alert(data.message || "Registration failed");
    }
  })
  .catch(err => {
    console.error("Register Error:", err);
    alert("Something went wrong");
  });
}
</script>


  <script src="../script.js"></script>
</body>
</html>
