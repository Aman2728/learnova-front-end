<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Assignments</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="assignments.css">
</head>

<body>

<div id="header"></div>

<div class="admin-wrapper">

<div id="sidebar"></div>

<div class="main-content">

<h1 class="page-title">My Assignments</h1>

<!-- SUMMARY -->
<div class="summary">

<div class="sum-card">
<h2 id="totalAssignments">0</h2>
<p>Assignments Assigned</p>
</div>

<div class="sum-card">
<h2 id="submittedCount">0</h2>
<p>Submitted</p>
</div>

<div class="sum-card">
<h2 id="pendingCount">0</h2>
<p>Pending</p>
</div>

<div class="sum-card progress-card">
<h2 id="progressPercent">0%</h2>
<p>Completed</p>

<div class="circle">
<div class="inner" id="progressCircle">0%</div>
</div>

</div>

</div>

<!-- ASSIGNMENT LIST -->
<div class="assignment-box" id="assignmentContainer">

<!-- Dynamic assignments will appear here -->

</div>

</div>
</div>


<script>
fetch("header.html").then(r=>r.text()).then(d=>header.innerHTML=d);
fetch("sidebar.html").then(r=>r.text()).then(d=>sidebar.innerHTML=d);
</script>

<script src="assignments.js"></script>
<script src="../../script.js"></script>

</body>
</html>
