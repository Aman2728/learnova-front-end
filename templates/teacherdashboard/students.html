<!DOCTYPE html>
<html>
<head>
    <title>Students - Teacher Panel</title>
    <link rel="stylesheet" href="students.css">
</head>
<body>

<!-- SIDEBAR (UNCHANGED STRUCTURE) -->
<div class="sidebar">
    <div class="logo">Teacher Panel</div>
    <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="courses.html">My Courses</a></li>
        <li><a href="assignments.html">Assignments</a></li>
        <li class="active"><a href="students.html">Students</a></li>
        <li><a href="attendance.html">Attendance</a></li>
        <li><a href="grades.html">Grades</a></li>
        <li><a href="messages.html">Messages</a></li>
        <li><a href="profile.html">Profile</a></li>
        <button class="logout-btn">Logout</button>

    </ul>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <!-- HEADER -->
    <div class="header">
        <h2>Students Overview</h2>
        <span id="teacherName">Welcome</span>
    </div>

    <!-- ANALYTICS CARDS -->
    <div class="analytics">
        <div class="card">
            <h3>Total Students</h3>
            <p id="totalStudents">0</p>
        </div>

        <div class="card">
            <h3>Active Students</h3>
            <p>112</p>
        </div>

        <div class="card">
            <h3>Average Performance</h3>
            <p>78%</p>
        </div>

        <div class="card">
            <h3>Top Performers</h3>
            <p>18</p>
        </div>
    </div>

    <!-- STUDENT TABLE -->
    <div class="student-section">
        <h3>Student List</h3>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Class</th>
                    <th>Attendance</th>
                    <th>Average Grade</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="studentTableBody">
</tbody>
        </table>
    </div>

</div>

<script src="students.js"></script>
<script src="../../script.js"></script>
</body>
</html>
