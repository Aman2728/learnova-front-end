<!DOCTYPE html>
<html>
<head>
    <title>Attendance - Teacher Panel</title>
    <link rel="stylesheet" href="attendance.css">
</head>
<body>

<!-- SIDEBAR (UNCHANGED) -->
<div class="sidebar">
    <div class="logo">Teacher Panel</div>
    <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="courses.html">My Courses</a></li>
        <li><a href="assignments.html">Assignments</a></li>
        <li><a href="students.html">Students</a></li>
        <li class="active"><a href="attendance.html">Attendance</a></li>
        <li><a href="grades.html">Grades</a></li>
        <li><a href="messages.html">Messages</a></li>
        <li><a href="profile.html">Profile</a></li>
        <button class="logout-btn">Logout</button>

    </ul>
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <h2>Teacher Attendance Overview</h2>
         <span id="teacherName">Welcome</span>
         <span id="liveClock"></span>
    </div>

    <!-- ANALYTICS -->
    <div class="analytics">
        <div class="card">
            <h3>Total Working Days</h3>
            <p>22</p>
        </div>

        <div class="card">
            <h3>Present Days</h3>
            <p id="presentDays">0</p>
        </div>

        <div class="card">
            <h3>Leaves Taken</h3>
            <p>3</p>
        </div>

        <div class="card">
            <h3>Govt Holidays</h3>
            <p>2</p>
        </div>
    </div>

    <!-- CHECK IN OUT -->
    <div class="check-section">
        <h3>Today's Attendance</h3>
        <div class="buttons">
            <button class="checkin" onclick="markPresent()">Check In</button>
            <button class="checkout" onclick="markAbsent()">Mark Absent</button>
        </div>
        <p id="statusMessage"></p>
    </div>

    <!-- CALENDAR -->
    <div class="calendar-section">
        <h3>February 2026</h3>
        <div class="calendar" id="calendar"></div>
    </div>

</div>

<script src="attendance.js"></script>
<script src="../../script.js"></script>
</body>
</html>
